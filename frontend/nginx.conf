server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # SPA : une route inconnue doit rendre index.html, pas un 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vidéos téléchargées (volume partagé avec l'API). Servies par nginx et
    # pas par Flask : les requêtes Range du seek sont son métier.
    location /videos/ {
        alias /usr/share/nginx/videos/;
        add_header Accept-Ranges bytes;
        # Un .part est un mux en cours : ne jamais l'exposer.
        location ~ \.part$ {
            return 404;
        }
    }

    # Le front appelle /api en relatif : même origine, donc aucun CORS en jeu.
    location /api/ {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Résoudre un épisode = scraping + resolvers, le défaut de 60s est juste.
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location = /health {
        proxy_pass http://api:5000/health;
    }
}
